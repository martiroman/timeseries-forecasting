apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prom-analysis-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - host: test-app.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: prom-analysis-svc
            port:
              number: 5000
