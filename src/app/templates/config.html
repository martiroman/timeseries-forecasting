<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuración - Prometheus</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='main.css') }}">
</head>
<body>
    <div class="header">
        <img src="https://www.powercloud.com.ar/img/powercloud-light.svg" alt="Logo de PowerCloud">
    </div>

    <h1>Configuración de Prometheus</h1>

    <form method="post">
        <label for="prom_url">URL de Prometheus:</label><br>
        <input type="text" id="prom_url" name="prom_url" value="{{ prom_url }}" style="width: 100%;"><br><br>

        <label for="prom_range_start">Rango por defecto para el forecast (ej: 2d, 6h):</label><br>
        <input type="text" id="prom_range_start" name="prom_range_start" value="{{ prom_range_start }}"><br><br>

        <button type="submit">Guardar</button>
        <a href="{{ url_for('main.index') }}" class="button-link">Cancelar</a>
    </form>
</body>
</html>
