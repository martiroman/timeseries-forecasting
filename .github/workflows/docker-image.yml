---
name: Docker Image CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'k8s-yaml/**'
      
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'k8s-yaml/**'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Build the Docker image
      run: |
           docker login -u ${{ secrets.DOCKER_HUB_USERNAME }} --password ${{ secrets.DOCKER_HUB_PASSWORD }}
           docker build . --file Dockerfile --platform linux/amd64 --tag ${{ secrets.DOCKER_HUB_USERNAME }}/prom-analysis:latest
           docker push ${{ secrets.DOCKER_HUB_USERNAME }}/prom-analysis:latest 
